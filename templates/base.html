<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Tavern · 角色工坊{% endblock %}</title>
    <!-- 字体 & 图标 & CSS -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="bg-blur"></div>
    <div class="bg-dots"></div>

    <div class="container">
        

        <nav style="display: flex; gap: 1rem; margin-bottom: 2rem; justify-content: flex-end;">
            <a href="{{ url_for('new_character') }}" class="btn btn-outline">
                <i class="fas fa-plus"></i> 新建角色

            </a>

            <a href="{{ url_for('list_characters') }}" class="btn btn-outline">
                <i class="fas fa-list"></i> 所有角色

            </a>
        </nav>


        <main class="glass-card">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                <div class="flash-messages">
                    {% for category, message in messages %}
                    <div class="flash {{ category }}">
                        <i class="fas fa-{% if category == 'success' %}check-circle{% else %}exclamation-circle{% endif %}"></i>
                        {{ message }}


                    </div>
                    {% endfor %}
                </div>
                {% endif %}
            {% endwith %}

            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>


</body>
</html>
